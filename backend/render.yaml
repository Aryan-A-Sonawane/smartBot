# Render Blueprint for the SmartBot backend (Docker web service).
# Deploy: push to GitHub, then "New > Blueprint" in Render and point at this repo.
services:
  - type: web
    name: smartbot-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set in the Render dashboard (secret)
      - key: GEMINI_MODEL_FAST
        value: gemini-2.5-flash
      - key: GEMINI_MODEL_PRO
        value: gemini-2.5-pro
      - key: WHISPER_MODEL
        value: base
      - key: MAX_FILE_MB
        value: "25"
      - key: ALLOWED_ORIGINS
        sync: false # e.g. https://your-frontend.vercel.app
