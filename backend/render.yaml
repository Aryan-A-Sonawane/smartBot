# Render Blueprint for the SmartBot backend (Docker web service).
# Deploy: push to GitHub, then "New > Blueprint" in Render and point at this repo.
services:
  - type: web
    name: smartbot-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Free tier: no cost, but 512 MB RAM + spins down after inactivity. Text/PDF/
    # image/YouTube work well; for reliable AUDIO transcription bump to a paid
    # plan (2 GB) and set WHISPER_MODEL=base|small. See README > Deployment.
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set in the Render dashboard (secret)
      - key: GEMINI_MODEL_FAST
        value: gemini-2.5-flash
      - key: GEMINI_MODEL_PRO
        value: gemini-2.5-pro
      - key: GEMINI_USE_PRO
        value: "false" # flash-only; set true only if the key has high pro limits
      - key: GEMINI_EMBED_MODEL
        value: models/gemini-embedding-001 # embeddings for RAG retrieval
      - key: WHISPER_MODEL
        value: tiny # fits the free tier's 512 MB RAM; use base/small on a larger plan
      - key: MAX_FILE_MB
        value: "25"
      - key: MAX_AUDIO_MINUTES
        value: "10" # reject longer clips with a clear message (512 MB memory guard)
      - key: ALLOWED_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://smartbot.vercel.app
